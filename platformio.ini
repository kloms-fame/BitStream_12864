; ============================================================================
; BitStream V2 — PlatformIO 项目配置
; 开发板: NodeMCU v2 (ESP8266) | 文件系统: LittleFS | 框架: Arduino
; ============================================================================

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino

monitor_speed = 115200

; --- 文件系统 ---
board_build.filesystem = littlefs

; --- 编译优化 ---
build_flags =
    -Os                          ; 体积优化（ESP8266 Flash 有限）
    -std=c++17                   ; 现代 C++（支持 if constexpr / string_view 等）
    -Wno-unused-variable         ; 抑制未使用变量警告（Arduino 框架常见）

; --- 库依赖 ---
lib_deps =
    olikraus/U8g2               ; OLED 图形库（SSD1306 128×64）
    links2004/WebSockets        ; WebSocket 服务端（81 端口推流）
    bblanchon/ArduinoJson       ; JSON 解析（凭据持久化 / 运行参数配置）

; --- 库私有路径 ---
lib_extra_dirs =
    ${PROJECT_DIR}/lib

; --- 测试环境 ---
test_build_project_src = yes    ; 单元测试编译整个项目源
