<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitStream · ESP8266 OLED 推流控制台</title>
<style>
  :root {
    --bg:       #121212;
    --surface:  #1a1a1a;
    --accent:   #00ffcc;
    --accent-dim: rgba(0,255,204,0.10);
    --text:     #eaeaea;
    --muted:    #777;
    --danger:   #ff4466;
    --warn:     #ffaa00;
    --border:   #2a2a2a;
    --radius:   10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:radial-gradient(ellipse at 50% 0%,#1a1a2e 0%,#121212 70%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    display:flex;flex-direction:column;align-items:center;
    padding:40px 16px 60px;min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  h1{
    font-size:1.8rem;font-weight:700;letter-spacing:6px;margin-bottom:36px;
    background:linear-gradient(135deg,var(--accent) 0%,#00d4aa 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 18px rgba(0,255,204,0.4));
  }

  .card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:20px 24px;
    width:100%;max-width:560px;margin-bottom:16px;
    backdrop-filter:blur(4px);transition:border-color .3s,box-shadow .3s;
  }
  .card:hover{border-color:#3a3a3a;box-shadow:0 0 24px rgba(0,255,204,0.04);}

  .card-title{
    color:var(--accent);font-size:.72rem;font-weight:600;
    text-transform:uppercase;letter-spacing:3px;margin-bottom:16px;
    padding-bottom:10px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:8px;
  }
  .card-title::before{
    content:'';display:inline-block;
    width:6px;height:6px;background:var(--accent);border-radius:50%;
    box-shadow:0 0 8px var(--accent);
  }

  /* ── 连接状态栏 ── */
  .status-row{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  }
  .status-dot{
    width:10px;height:10px;border-radius:50%;flex-shrink:0;
    transition:all .3s;
  }
  .status-dot.on{background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2s infinite;}
  .status-dot.off{background:var(--danger);box-shadow:0 0 6px var(--danger);}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

  .status-info{flex:1;min-width:0;}
  .status-ip{font-family:'SF Mono','Cascadia Code','Consolas',monospace;font-size:.82rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .status-meta{font-size:.68rem;color:var(--muted);margin-top:2px;}

  .ping-badge{
    font-family:'SF Mono','Cascadia Code','Consolas',monospace;
    font-size:.7rem;padding:4px 10px;border-radius:20px;
    border:1px solid var(--border);color:var(--muted);
    white-space:nowrap;
  }
  .ping-badge.good{border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px var(--accent-dim);}
  .ping-badge.warn{border-color:var(--warn);color:var(--warn);}
  .ping-badge.bad{border-color:var(--danger);color:var(--danger);}

  /* ── 视频播放中枢 ── */
  video{
    width:100%;border-radius:8px;background:#000;
    border:1px solid var(--border);
    display:block;outline:none;
  }
  video:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}

  .file-row{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap;}
  input[type="file"]{display:none;}

  .btn{
    padding:9px 20px;border:1px solid var(--accent);border-radius:8px;
    background:transparent;color:var(--accent);
    font-family:inherit;font-size:.78rem;font-weight:600;
    cursor:pointer;letter-spacing:1px;
    transition:all .25s;white-space:nowrap;text-transform:uppercase;
  }
  .btn:hover:not(:disabled){background:var(--accent);color:#121212;box-shadow:0 0 18px rgba(0,255,204,0.35);}
  .btn:active:not(:disabled){transform:scale(.97);}
  .btn:disabled{opacity:.25;cursor:not-allowed;border-color:var(--border);color:var(--muted);}

  .btn-file{border-style:dashed;}

  .file-name{font-size:.74rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}

  /* ── 控制面板 ── */
  .slider-group{margin-bottom:14px;}
  .slider-label{display:flex;justify-content:space-between;align-items:center;font-size:.74rem;color:var(--muted);margin-bottom:6px;}
  .slider-val{color:var(--accent);font-family:'SF Mono','Cascadia Code','Consolas',monospace;font-weight:600;}

  input[type="range"]{
    -webkit-appearance:none;appearance:none;width:100%;height:6px;
    border-radius:3px;background:#2a2a2a;outline:none;
    transition:background .2s;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;
    width:18px;height:18px;border-radius:50%;
    background:var(--accent);cursor:pointer;
    box-shadow:0 0 10px rgba(0,255,204,0.5);
  }

  select{
    padding:8px 12px;background:#111;border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-family:inherit;font-size:.78rem;
    outline:none;cursor:pointer;transition:border-color .25s;
  }
  select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}

  .fps-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .fps-label{font-size:.74rem;color:var(--muted);}

  /* ── OLED 预览 ── */
  .preview-wrap{display:flex;justify-content:center;padding:8px 0 2px;}
  canvas#preview{
    image-rendering:pixelated;image-rendering:crisp-edges;
    width:512px;height:256px;border:2px solid #333;border-radius:6px;
    background:#000;box-shadow:0 0 30px rgba(0,255,204,0.06);
  }

  .stream-stats{display:flex;justify-content:space-between;align-items:center;font-size:.7rem;color:var(--muted);margin-top:10px;}
  .stream-stats .fps{color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums;}

  /* ── 背压监控栏 ── */
  .backpressure-bar{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:8px;padding:8px 12px;
    background:rgba(255,68,102,0.06);border:1px solid rgba(255,68,102,0.15);
    border-radius:6px;font-size:.68rem;font-family:'SF Mono','Cascadia Code','Consolas',monospace;
  }
  .backpressure-bar.warning{background:rgba(255,68,102,0.12);border-color:rgba(255,68,102,0.35);animation:bpFlash .6s infinite alternate;}
  @keyframes bpFlash{from{opacity:1}to{opacity:.5}}
  .bp-label{color:var(--muted);}
  .bp-buffered{color:var(--warn);font-weight:600;}
  .bp-dropped{color:var(--danger);font-weight:600;}

  /* 响应式 */
  @media(max-width:540px){
    canvas#preview{width:320px;height:160px;}
    h1{font-size:1.3rem;letter-spacing:3px;}
  }
</style>
</head>
<body>

<h1>BITSTREAM</h1>

<!-- ═══ 连接状态栏 ═══ -->
<div class="card" id="statusCard">
  <div class="card-title">连接状态</div>
  <div class="status-row">
    <span class="status-dot off" id="statusDot"></span>
    <div class="status-info">
      <div class="status-ip" id="statusIP">等待连接…</div>
      <div class="status-meta" id="statusMeta"></div>
    </div>
    <span class="ping-badge" id="pingBadge">-- ms</span>
  </div>
</div>

<!-- ═══ 视频播放中枢 ═══ -->
<div class="card">
  <div class="card-title">视频</div>
  <video id="video" controls muted loop playsinline></video>
  <div class="file-row">
    <button class="btn btn-file" id="btnFile" onclick="fileInput.click()">选择文件</button>
    <span class="file-name" id="fileLabel">未选择文件</span>
    <input type="file" id="fileInput" accept="video/*" onchange="onFileSelected(event)">
  </div>
</div>

<!-- ═══ 极客控制面板 ═══ -->
<div class="card">
  <div class="card-title">控制面板</div>

  <div class="slider-group">
    <div class="slider-label"><span>二值化阈值</span><span class="slider-val" id="thresholdVal">128</span></div>
    <input type="range" id="thresholdSlider" min="0" max="255" value="128" oninput="onThresholdChange()">
  </div>

  <div class="fps-row">
    <span class="fps-label">帧率</span>
    <select id="fpsSelect" onchange="onFpsChange()">
      <option value="10">10 fps</option>
      <option value="15">15 fps</option>
      <option value="20" selected>20 fps</option>
      <option value="30">30 fps</option>
    </select>
  </div>

  <div class="preview-wrap">
    <canvas id="preview" width="128" height="64"></canvas>
  </div>

  <div class="stream-stats">
    <span>推流状态: <span id="streamState" style="color:var(--muted);">待机</span></span>
    <span class="fps" id="fpsCounter"></span>
  </div>

  <!-- 背压监控栏 -->
  <div class="backpressure-bar" id="bpBar">
    <span class="bp-label">堆积字节</span>
    <span class="bp-buffered" id="bpBuffered">0 B</span>
    <span class="bp-label">丢帧</span>
    <span class="bp-dropped" id="bpDropped">0</span>
  </div>
</div>

<canvas id="hiddenCanvas" width="128" height="64" style="display:none;"></canvas>

<script>
const $=id=>document.getElementById(id);
const ipInputVal=()=>{const p=new URLSearchParams(window.location.search).get('ip');return p?('ws://'+p+':81/'):null;};
const statusDot=$('statusDot'),statusIP=$('statusIP'),statusMeta=$('statusMeta'),pingBadge=$('pingBadge');
const video=$('video'),fileInput=$('fileInput'),fileLabel=$('fileLabel');
const thresholdSlider=$('thresholdSlider'),thresholdVal=$('thresholdVal'),fpsSelect=$('fpsSelect');
const preview=$('preview'),hiddenCvs=$('hiddenCanvas'),streamState=$('streamState'),fpsCounter=$('fpsCounter');
const bpBar=$('bpBar'),bpBuffered=$('bpBuffered'),bpDropped=$('bpDropped');
const ctxHidden=hiddenCvs.getContext('2d',{willReadFrequently:true});
const ctxPreview=preview.getContext('2d');

let ws=null,connected=false,streaming=false;
let threshold=128,fpsTarget=20;
let frameCnt=0,lastFrameTime=0,rafId=null;
let fpsTimer=null;
let droppedFrames=0;
let pingStart=0,pingValue=-1,pingTimer=null;

/* ====================================================================== */
/*  URL 参数自动连接                                                       */
/* ====================================================================== */
(function autoInit(){
  const wsUrl=ipInputVal();
  if(wsUrl){connect(wsUrl);}
})();

function connect(wsUrl){
  if(connected)disconnect();
  const url=wsUrl||ipInputVal();
  if(!url){setStatus(false,'未检测到设备 IP，请在 URL 后添加 ?ip=192.168.x.x');return;}

  try{ws=new WebSocket(url);}catch(e){setStatus(false,'URL 格式无效');return;}
  ws.binaryType='arraybuffer';
  setStatus(false,'正在连接 '+url+' …');

  ws.onopen=()=>{
    connected=true;droppedFrames=0;setStatus(true,url);updateBackpressure();
    startPing();
  };

  ws.onclose=()=>{
    connected=false;if(streaming)stopStream();
    stopPing();setStatus(false,'连接已关闭');updateBackpressure();
  };

  ws.onerror=()=>{setStatus(false,'连接失败');};

  ws.onmessage=(e)=>{
    if(typeof e.data==='string'&&e.data==='pong'){
      pingValue=Date.now()-pingStart;
      updatePingBadge();
    }
  };
}

function disconnect(){
  if(streaming)stopStream();
  stopPing();
  if(ws){ws.onclose=null;ws.close();ws=null;}
  connected=false;setStatus(false,'已断开');updateBackpressure();
}

function setStatus(on,text){
  statusDot.className='status-dot '+(on?'on':'off');
  statusIP.textContent=text||'等待连接…';
  statusMeta.textContent=on?'WebSocket 已建立 · 端口 81':'';
}

/* ====================================================================== */
/*  Ping/延迟检测                                                          */
/* ====================================================================== */
function startPing(){
  pingTimer=setInterval(()=>{
    if(ws&&ws.readyState===WebSocket.OPEN){
      pingStart=Date.now();ws.send('ping');
    }
  },2000);
}

function stopPing(){
  if(pingTimer){clearInterval(pingTimer);pingTimer=null;}
  pingValue=-1;updatePingBadge();
}

function updatePingBadge(){
  if(pingValue<0){pingBadge.textContent='-- ms';pingBadge.className='ping-badge';statusMeta.textContent='WebSocket 已建立 · 端口 81';}
  else{
    pingBadge.textContent=pingValue+' ms';
    pingBadge.className='ping-badge '+(pingValue<30?'good':pingValue<80?'warn':'bad');
    statusMeta.textContent='WebSocket 已建立 · 端口 81 · 延迟 '+pingValue+'ms';
  }
}

/* ====================================================================== */
/*  背压监控 UI                                                            */
/* ====================================================================== */
function updateBackpressure(){
  const buf=ws&&ws.readyState===WebSocket.OPEN?ws.bufferedAmount:0;
  bpBuffered.textContent=buf>1024?(buf/1024).toFixed(1)+' KB':buf+' B';
  bpDropped.textContent=droppedFrames;

  // 有堆积时闪烁警告
  bpBar.className='backpressure-bar'+(buf>0?' warning':'');
}

/* ====================================================================== */
/*  音画同步控制                                                           */
/* ====================================================================== */
video.addEventListener('play',()=>{
  if(connected&&!streaming&&video.src)startStream();
});

video.addEventListener('pause',()=>{
  if(streaming)stopStream();
});

video.addEventListener('ended',()=>{
  if(streaming)stopStream();
});

function startStream(){
  if(!connected||!ws||ws.readyState!==WebSocket.OPEN||!video.src)return;
  streaming=true;frameCnt=0;droppedFrames=0;lastFrameTime=0;
  updateState();updateBackpressure();
  fpsTimer=setInterval(()=>{fpsCounter.textContent=frameCnt+' fps';frameCnt=0;},1000);
  rafId=requestAnimationFrame(processFrameLoop);
}

function stopStream(){
  streaming=false;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(fpsTimer){clearInterval(fpsTimer);fpsTimer=null;}
  fpsCounter.textContent='';updateState();updateBackpressure();
}

function updateState(){
  streamState.textContent=streaming?'推流中':'待机';
  streamState.style.color=streaming?'var(--accent)':'var(--muted)';
}

/* ====================================================================== */
/*  控制面板回调                                                           */
/* ====================================================================== */
function onThresholdChange(){
  threshold=parseInt(thresholdSlider.value);thresholdVal.textContent=threshold;
}

function onFpsChange(){
  fpsTarget=parseInt(fpsSelect.value);
  if(streaming){stopStream();startStream();}
}

function onFileSelected(e){
  const file=e.target.files[0];if(!file)return;
  video.src=URL.createObjectURL(file);
  fileLabel.textContent=file.name;
  video.load();
}

/* ====================================================================== */
/*  requestAnimationFrame 驱动的抽帧循环（平滑调度）                       */
/* ====================================================================== */
function processFrameLoop(timestamp){
  if(!streaming){return;}

  // 基于 fpsTarget 的节流控制
  const interval=1000/fpsTarget;
  if(timestamp-lastFrameTime>=interval){
    lastFrameTime=timestamp;
    processAndSendFrame();
  }

  // 每帧刷新一次背压 UI（即使没有抽帧也更新）
  updateBackpressure();

  rafId=requestAnimationFrame(processFrameLoop);
}

/* ====================================================================== */
/*  高性能抽帧 → 灰度 → XBM → 背压控制 → WebSocket                        */
/* ====================================================================== */
function processAndSendFrame(){
  if(!streaming||video.paused||video.ended)return;

  ctxHidden.drawImage(video,0,0,128,64);
  const d=ctxHidden.getImageData(0,0,128,64).data;
  const xbm=new Uint8Array(1024);
  const th=threshold;

  for(let y=0;y<64;y++){
    const ro=y*128*4;
    for(let bx=0;bx<16;bx++){
      let bv=0;
      for(let bit=0;bit<8;bit++){
        const i=ro+(bx*8+bit)*4;
        if(0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]>th)bv|=(1<<bit);
      }
      xbm[y*16+bx]=bv;
    }
  }

  // OLED 点阵预览（始终渲染，不受背压影响）
  const pi=ctxPreview.createImageData(128,64),pp=pi.data;
  for(let y=0;y<64;y++){
    for(let bx=0;bx<16;bx++){
      const bv=xbm[y*16+bx];
      for(let bit=0;bit<8;bit++){
        const px=bx*8+bit,idx=(y*128+px)*4,v=(bv>>bit)&1?255:0;
        pp[idx]=pp[idx+1]=pp[idx+2]=v;pp[idx+3]=255;
      }
    }
  }
  ctxPreview.putImageData(pi,0,0);

  // ── 背压控制：TCP 缓冲区堆积时主动丢帧 ──
  if(ws.readyState!==WebSocket.OPEN)return;

  if(ws.bufferedAmount>0){
    droppedFrames++;
    return; // 丢弃当前帧，不发送
  }

  ws.send(xbm.buffer);
  frameCnt++;
}

/* ====================================================================== */
/*  页面卸载清理                                                           */
/* ====================================================================== */
window.addEventListener('beforeunload',()=>{
  if(streaming)stopStream();
  stopPing();
  if(ws){ws.onclose=null;ws.close();}
});
</script>
</body>
</html>
