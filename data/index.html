<!DOCTYPE html>
<html lang=""zh-CN"">
<head>
<meta charset=""UTF-8"">
<meta name=""viewport"" content=""width=device-width, initial-scale=1.0"">
<title>BitStream · 流媒体推流控制台</title>
<style>
  :root {
    --bg:       #121212;
    --surface:  #1e1e1e;
    --accent:   #00ffcc;
    --text:     #e0e0e0;
    --muted:    #888;
    --danger:   #ff4466;
    --border:   #333;
    --radius:   8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Consolas, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
    min-height: 100vh;
  }

  h1 {
    font-size: 1.6rem;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 32px;
    text-shadow: 0 0 12px rgba(0,255,204,0.3);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 100%;
    max-width: 540px;
    margin-bottom: 20px;
  }

  .card-title {
    color: var(--accent);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  input[type=""text""] {
    flex: 1;
    min-width: 180px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type=""text""]:focus { border-color: var(--accent); }

  input[type=""file""] { display: none; }

  .btn {
    padding: 10px 20px;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    background: transparent;
    color: var(--accent);
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .btn:hover:not(:disabled) {
    background: var(--accent);
    color: var(--bg);
  }
  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn-stop {
    border-color: var(--danger);
    color: var(--danger);
  }
  .btn-stop:hover:not(:disabled) {
    background: var(--danger);
    color: #fff;
  }

  .btn-file { border-style: dashed; }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .status-dot.on  { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.off { background: var(--danger); }

  .status-text {
    font-size: 0.8rem;
    color: var(--muted);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .preview-wrap {
    display: flex;
    justify-content: center;
    padding: 8px 0;
  }

  canvas#preview {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 512px;
    height: 256px;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 10px;
  }

  .fps { color: var(--accent); }

  /* 滑块样式 */
  input[type=""range""] {
    -webkit-appearance: none;
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  input[type=""range""]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }

  .slider-val {
    color: var(--accent);
    font-size: 0.85rem;
    min-width: 36px;
    text-align: right;
    font-weight: bold;
  }

  .slider-label {
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 54px;
  }

  select {
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--accent);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }
</style>
</head>
<body>

<h1>◈ BITSTREAM ◈</h1>

<!-- ===== 连接面板 ===== -->
<div class=""card"">
  <div class=""card-title"">连接 · Connection</div>
  <div class=""row"">
    <input type=""text"" id=""ipInput"" placeholder=""ws://192.168.1.100:81"" value=""ws://192.168.1.100:81"">
    <button class=""btn"" id=""btnConnect"" onclick=""toggleConnection()"">连接</button>
  </div>
  <div class=""row"" style=""margin-top:12px;"">
    <span class=""status-dot off"" id=""statusDot""></span>
    <span class=""status-text"" id=""statusLabel"">未连接</span>
  </div>
</div>

<!-- ===== 控制面板 ===== -->
<div class=""card"">
  <div class=""card-title"">控制 · Control</div>
  <div class=""row"">
    <button class=""btn btn-file"" id=""btnFile"" onclick=""document.getElementById('fileInput').click()"">选择视频</button>
    <input type=""file"" id=""fileInput"" accept=""video/*"" onchange=""onFileSelected(event)"">
    <button class=""btn"" id=""btnStart"" onclick=""startStream()"" disabled>开始推流</button>
    <button class=""btn btn-stop"" id=""btnStop"" onclick=""stopStream()"" disabled>停止</button>
  </div>
  <div class=""info-row"">
    <span id=""fileLabel"">未选择文件</span>
    <span class=""fps"" id=""fpsLabel""></span>
  </div>
</div>

<!-- ===== 参数面板 ===== -->
<div class=""card"">
  <div class=""card-title"">参数 · Parameters</div>

  <div class=""row"">
    <span class=""slider-label"">阈值</span>
    <input type=""range"" id=""thresholdSlider"" min=""0"" max=""255"" value=""128"" oninput=""onThresholdChange()"">
    <span class=""slider-val"" id=""thresholdVal"">128</span>
  </div>

  <div class=""row"" style=""margin-top:14px;"">
    <span class=""slider-label"">帧率</span>
    <select id=""fpsSelect"" onchange=""onFpsChange()"">
      <option value=""10"">10 fps</option>
      <option value=""15"">15 fps</option>
      <option value=""20"" selected>20 fps</option>
    </select>
  </div>
</div>

<!-- ===== 预览面板 ===== -->
<div class=""card"">
  <div class=""card-title"">预览 · Preview (128×64)</div>
  <div class=""preview-wrap"">
    <canvas id=""preview"" width=""128"" height=""64""></canvas>
  </div>
</div>

<!-- 隐藏元素 -->
<video id=""video"" muted loop playsinline style=""display:none;""></video>
<canvas id=""hiddenCanvas"" width=""128"" height=""64"" style=""display:none;""></canvas>

<script>
/* ======================================================================== */
/*  DOM 引用                                                                */
/* ======================================================================== */

const ipInput     = document.getElementById('ipInput');
const btnConnect  = document.getElementById('btnConnect');
const statusDot   = document.getElementById('statusDot');
const statusLabel = document.getElementById('statusLabel');
const btnFile     = document.getElementById('btnFile');
const fileInput   = document.getElementById('fileInput');
const btnStart    = document.getElementById('btnStart');
const btnStop     = document.getElementById('btnStop');
const fileLabel   = document.getElementById('fileLabel');
const fpsLabel    = document.getElementById('fpsLabel');
const video       = document.getElementById('video');
const preview     = document.getElementById('preview');
const hiddenCvs   = document.getElementById('hiddenCanvas');
const ctxHidden   = hiddenCvs.getContext('2d', { willReadFrequently: true });
const ctxPreview  = preview.getContext('2d');

const thresholdSlider = document.getElementById('thresholdSlider');
const thresholdVal    = document.getElementById('thresholdVal');
const fpsSelect       = document.getElementById('fpsSelect');

/* ======================================================================== */
/*  状态变量                                                                */
/* ======================================================================== */

let ws        = null;
let streamId  = null;
let connected = false;
let streaming = false;
let frameCnt  = 0;
let fpsTimer  = null;

let threshold = 128;
let fpsTarget = 20;

/* ======================================================================== */
/*  WebSocket 管理                                                          */
/* ======================================================================== */

function toggleConnection() {
  if (connected) { disconnect(); }
  else           { connect();    }
}

function connect() {
  const url = ipInput.value.trim();
  if (!url) return;

  try { ws = new WebSocket(url); }
  catch (e) {
    setStatus(false, 'URL 格式无效');
    return;
  }

  ws.binaryType = 'arraybuffer';
  btnConnect.textContent = '…';
  btnConnect.disabled = true;

  ws.onopen = () => {
    connected = true;
    setStatus(true, '已连接 · ' + url);
    btnConnect.textContent = '断开';
    btnConnect.disabled = false;
    updateUI();
  };

  ws.onclose = () => {
    connected = false;
    if (streaming) stopStream();
    setStatus(false, '连接已关闭');
    btnConnect.textContent = '连接';
    btnConnect.disabled = false;
    updateUI();
  };

  ws.onerror = () => {
    setStatus(false, '连接失败');
  };
}

function disconnect() {
  if (streaming) stopStream();
  if (ws) {
    ws.onclose = null;
    ws.close();
    ws = null;
  }
  connected = false;
  setStatus(false, '已断开');
  btnConnect.textContent = '连接';
  updateUI();
}

function setStatus(on, text) {
  statusDot.className = 'status-dot ' + (on ? 'on' : 'off');
  statusLabel.textContent = text;
}

/* ======================================================================== */
/*  参数变更                                                                */
/* ======================================================================== */

function onThresholdChange() {
  threshold = parseInt(thresholdSlider.value);
  thresholdVal.textContent = threshold;
}

function onFpsChange() {
  fpsTarget = parseInt(fpsSelect.value);

  // 若正在推流，动态重建定时器
  if (streaming) {
    clearInterval(streamId);
    streamId = setInterval(processFrame, 1000 / fpsTarget);
  }
}

/* ======================================================================== */
/*  文件选择                                                                */
/* ======================================================================== */

function onFileSelected(e) {
  const file = e.target.files[0];
  if (!file) return;

  video.src = URL.createObjectURL(file);
  fileLabel.textContent = file.name;
  video.load();
  updateUI();
}

/* ======================================================================== */
/*  单帧处理（提取为共用函数以便动态帧率重建）                              */
/* ======================================================================== */

function processFrame() {
  if (!streaming) return;

  // 1. 绘制当前帧到隐藏 Canvas
  ctxHidden.drawImage(video, 0, 0, 128, 64);

  // 2. 获取像素 RGBA
  const imgData = ctxHidden.getImageData(0, 0, 128, 64);
  const pixels  = imgData.data;

  // 3. 二值化 + XBM 打包 (1024 字节, LSB 优先)
  const xbm = new Uint8Array(1024);
  const th  = threshold;

  for (let y = 0; y < 64; y++) {
    const rowOff = y * 128 * 4;
    for (let bx = 0; bx < 16; bx++) {
      let byteVal = 0;
      for (let bit = 0; bit < 8; bit++) {
        const px = bx * 8 + bit;
        const i  = rowOff + px * 4;
        const gray = 0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2];
        if (gray > th) byteVal |= (1 << bit);
      }
      xbm[y * 16 + bx] = byteVal;
    }
  }

  // 4. 渲染预览 Canvas
  const prevImg = ctxPreview.createImageData(128, 64);
  const prevPx  = prevImg.data;
  for (let y = 0; y < 64; y++) {
    for (let bx = 0; bx < 16; bx++) {
      const byteVal = xbm[y * 16 + bx];
      for (let bit = 0; bit < 8; bit++) {
        const px  = bx * 8 + bit;
        const idx = (y * 128 + px) * 4;
        const val = (byteVal >> bit) & 1 ? 255 : 0;
        prevPx[idx]     = val;
        prevPx[idx + 1] = val;
        prevPx[idx + 2] = val;
        prevPx[idx + 3] = 255;
      }
    }
  }
  ctxPreview.putImageData(prevImg, 0, 0);

  // 5. 通过 WebSocket 发送
  if (ws.readyState === WebSocket.OPEN) {
    ws.send(xbm.buffer);
  }

  frameCnt++;
}

/* ======================================================================== */
/*  推流控制                                                                */
/* ======================================================================== */

function startStream() {
  if (!connected || !ws || ws.readyState !== WebSocket.OPEN) return;
  if (!video.src) return;

  video.play().then(() => {
    streaming = true;
    frameCnt  = 0;
    updateUI();

    fpsTimer = setInterval(() => {
      fpsLabel.textContent = frameCnt + ' fps';
      frameCnt = 0;
    }, 1000);

    streamId = setInterval(processFrame, 1000 / fpsTarget);
  }).catch(err => {
    console.error('视频播放失败:', err);
    alert('视频无法播放，请尝试其他文件');
  });
}

function stopStream() {
  streaming = false;
  if (streamId) { clearInterval(streamId); streamId = null; }
  if (fpsTimer) { clearInterval(fpsTimer); fpsTimer = null; }
  fpsLabel.textContent = '';
  updateUI();
}

/* ======================================================================== */
/*  UI 状态同步                                                             */
/* ======================================================================== */

function updateUI() {
  btnStart.disabled = !(connected && video.src && !streaming);
  btnStop.disabled  = !streaming;
  btnFile.disabled  = streaming;
  fpsSelect.disabled = streaming; // 推流中允许切换帧率，不禁用

  if (!video.src) fileLabel.textContent = '未选择文件';
}

/* ======================================================================== */
/*  生命周期                                                                */
/* ======================================================================== */

window.addEventListener('beforeunload', () => {
  if (streaming) stopStream();
  if (ws) { ws.onclose = null; ws.close(); }
});
</script>
</body>
</html>
